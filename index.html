<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Niklas &amp; Angela</title>
<meta name="description" content="Ein privater Liebes-Zähler." />
<meta name="theme-color" content="#17121d" />
<meta name="color-scheme" content="dark" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<style>
/* ============================ DESIGN-TOKENS ============================ */
:root{
  --night:#17121d; --night-2:#1f1826; --night-3:#291f31;
  --line:rgba(231,184,115,.16);
  --gold:#e7b873; --gold-soft:#f3d7a6; --rose:#e2899a; --rose-soft:#f0b8c2;
  --cream:#f3e8da; --muted:#ad9bab; --muted-2:#7d6f80;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
  --maxw:760px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 700px at 50% -10%, #2a1d33 0%, rgba(42,29,51,0) 60%),
    radial-gradient(900px 600px at 100% 110%, #241a2b 0%, rgba(36,26,43,0) 55%),
    var(--night);
  color:var(--cream);
  font-family:var(--sans);
  line-height:1.5;
  min-height:100vh;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
canvas#ambient,canvas#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none}
canvas#ambient{z-index:0;opacity:.5}
canvas#confetti{z-index:60}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:6px}

/* ============================ LOCK-SCREEN ============================ */
#lock{
  position:relative;z-index:10;min-height:100vh;min-height:100dvh;
  display:grid;place-items:center;padding:24px;
}
.lock-card{
  width:min(420px,100%);background:linear-gradient(180deg,var(--night-2),var(--night-3));
  border:1px solid var(--line);border-radius:22px;padding:38px 30px 30px;
  box-shadow:0 30px 80px -30px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.03);
  text-align:center;
}
.lock-card .monogram{font-family:var(--serif);font-size:34px;letter-spacing:.04em;color:var(--gold-soft)}
.lock-card .monogram .amp{color:var(--rose);margin:0 .12em;font-style:italic}
.lock-card h1{font-family:var(--serif);font-weight:500;font-size:1.45rem;margin:.6rem 0 .2rem;color:var(--cream)}
.lock-card .hint{color:var(--muted);font-size:.92rem;margin:0 0 1.4rem}
.field{display:flex;gap:8px;margin-top:6px}
.field input{
  flex:1;min-width:0;background:rgba(0,0,0,.28);border:1px solid var(--line);color:var(--cream);
  font-size:1rem;padding:13px 14px;border-radius:12px;font-family:var(--sans);
}
.field input::placeholder{color:var(--muted-2)}
.btn{
  border:1px solid transparent;cursor:pointer;font-family:var(--sans);font-weight:600;
  font-size:.95rem;border-radius:12px;padding:13px 18px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#2a1c0c;
  transition:transform .15s var(--ease),filter .15s var(--ease),opacity .15s;
}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.6;cursor:progress}
.lock-error{min-height:1.2em;margin:.9rem 0 0;color:var(--rose-soft);font-size:.9rem}
.lock-foot{margin-top:1.3rem;color:var(--muted-2);font-size:.78rem;line-height:1.45}
@keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
#lock.shake .lock-card{animation:shake .5s var(--ease)}

/* ============================ APP-LAYOUT ============================ */
#app{position:relative;z-index:10;max-width:var(--maxw);margin:0 auto;padding:clamp(20px,5vw,44px) 20px 64px}
#app[hidden]{display:none}

.seal{text-align:center;margin:6px 0 30px}
.seal .monogram{font-family:var(--serif);font-size:clamp(40px,11vw,58px);letter-spacing:.03em;color:var(--gold-soft);line-height:1}
.seal .monogram .amp{color:var(--rose);font-style:italic;margin:0 .08em}
.seal .eyebrow{font-family:var(--serif);font-size:1.05rem;letter-spacing:.18em;text-transform:uppercase;color:var(--cream);margin:.8rem 0 .15rem}
.seal .since{color:var(--muted);font-size:.92rem;margin:0;letter-spacing:.02em}

/* ---------- HERO / Hauptzähler ---------- */
.hero{text-align:center;margin:8px 0 40px}
.hero-label{color:var(--muted);font-size:.95rem;letter-spacing:.03em;margin:0 0 .4rem}
.counter{font-family:var(--serif);line-height:1}
.counter .big{
  display:block;font-size:clamp(3.4rem,17vw,8.4rem);font-weight:500;
  color:var(--gold-soft);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;
  letter-spacing:.005em;text-shadow:0 0 38px rgba(231,184,115,.28),0 2px 0 rgba(0,0,0,.25);
}
.counter .unit-label{display:block;font-family:var(--sans);font-size:1rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--muted);margin-top:.5rem}
/* "Alles"-Modus */
.all-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:.4rem 0 0;padding:0;text-align:left}
.all-row{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;
  display:flex;flex-direction:column;gap:2px;opacity:0;transform:translateY(8px);
  animation:rise .5s var(--ease) forwards;animation-delay:calc(var(--i)*60ms)}
@keyframes rise{to{opacity:1;transform:none}}
.all-row dt{font-family:var(--sans);font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.all-row dd{margin:0;font-family:var(--serif);font-size:1.7rem;color:var(--gold-soft);font-variant-numeric:tabular-nums}
.exact{margin:14px 2px 0;color:var(--rose-soft);font-size:.92rem;text-align:center}

.unit-switch{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:26px}
.unit-switch button{
  font-family:var(--sans);font-size:.82rem;letter-spacing:.02em;cursor:pointer;
  padding:8px 13px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.02);color:var(--muted);transition:all .18s var(--ease)}
.unit-switch button:hover{color:var(--cream);border-color:rgba(231,184,115,.4)}
.unit-switch button[aria-pressed="true"]{
  background:linear-gradient(180deg,rgba(231,184,115,.22),rgba(231,184,115,.1));
  color:var(--gold-soft);border-color:rgba(231,184,115,.55)}

/* ---------- PANELS ---------- */
.panel{
  background:linear-gradient(180deg,var(--night-2),rgba(31,24,38,.6));
  border:1px solid var(--line);border-radius:20px;padding:22px 22px 24px;margin:18px 0;
  box-shadow:0 20px 50px -34px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.025)}
.panel-head{margin-bottom:16px}
.panel-head .kicker{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);display:block;margin-bottom:3px}
.panel-head h2{font-family:var(--serif);font-weight:500;font-size:1.28rem;margin:0;color:var(--cream)}
.list-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.list-head .btn{background:rgba(231,184,115,.12);color:var(--gold-soft);border:1px solid rgba(231,184,115,.4);font-weight:500;font-size:.84rem;padding:9px 14px}
.list-head .btn:hover{background:rgba(231,184,115,.2)}

/* ---------- Hochzeits-Uhr ---------- */
.clock{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.clock .box{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:14px;padding:14px 4px;text-align:center}
.clock .num{display:block;font-family:var(--serif);font-size:clamp(1.5rem,6vw,2.1rem);color:var(--gold-soft);font-variant-numeric:tabular-nums}
.clock .cap{display:block;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px}
.married{font-family:var(--serif);font-size:1.5rem;color:var(--gold-soft);text-align:center;margin:6px 0}
.halfway{margin:16px 2px 0;color:var(--muted);font-size:.92rem;text-align:center}
.halfway.reached{color:var(--rose-soft)}

/* ---------- Nächster Meilenstein ---------- */
.next-ms{display:flex;align-items:center;gap:16px}
.next-emoji{font-size:2.6rem;line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
.next-body{flex:1;min-width:0}
.next-title{font-family:var(--serif);font-size:1.18rem;color:var(--cream);margin:0 0 1px}
.next-date{color:var(--muted);font-size:.86rem;margin:0 0 10px}
.next-cd{display:flex;gap:8px}
.cd{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:11px;padding:7px 10px;text-align:center;min-width:54px}
.cd .n{display:block;font-family:var(--serif);font-size:1.2rem;color:var(--gold-soft);font-variant-numeric:tabular-nums}
.cd .c{display:block;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* ---------- Meilenstein-Liste ---------- */
.ms-list{list-style:none;margin:4px 0 0;padding:0;max-height:360px;overflow-y:auto;
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 16px,#000 calc(100% - 16px),transparent);
          mask-image:linear-gradient(180deg,transparent,#000 16px,#000 calc(100% - 16px),transparent)}
.ms-item{display:flex;align-items:center;gap:12px;padding:11px 6px;border-bottom:1px solid rgba(255,255,255,.04)}
.ms-item:last-child{border-bottom:0}
.ms-emoji{font-size:1.35rem;width:1.6em;text-align:center;flex:none}
.ms-main{flex:1;min-width:0}
.ms-title{display:block;color:var(--cream);font-size:.96rem;line-height:1.25}
.ms-date{display:block;color:var(--muted-2);font-size:.78rem;margin-top:1px}
.ms-tag{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:999px;flex:none}
.ms-tag{background:rgba(226,137,154,.16);color:var(--rose-soft);border:1px solid rgba(226,137,154,.35)}
.ms-tag.next{background:rgba(231,184,115,.14);color:var(--gold-soft);border-color:rgba(231,184,115,.35)}
.ms-item.past{opacity:.42}
.ms-item.past .ms-emoji{filter:grayscale(.5)}
.ms-item.today{background:linear-gradient(90deg,rgba(231,184,115,.12),transparent);border-radius:12px}
.ms-item.isnext .ms-title{color:var(--gold-soft)}

/* ---------- Footer ---------- */
.foot{text-align:center;margin-top:40px}
.foot .foot-line{font-family:var(--serif);font-style:italic;font-size:1.2rem;color:var(--cream);margin:0}
.foot .sig{color:var(--muted);font-size:.85rem;letter-spacing:.18em;margin:.5rem 0 0}

/* ---------- Feier-Banner (heute = Meilenstein) ---------- */
.celebrate{position:relative;z-index:10;margin:0 0 22px;border-radius:18px;padding:16px 18px;text-align:center;
  background:linear-gradient(180deg,rgba(231,184,115,.2),rgba(226,137,154,.14));
  border:1px solid rgba(231,184,115,.45);box-shadow:0 14px 40px -22px rgba(231,184,115,.6)}
.celebrate .c-emoji{font-size:1.7rem}
.celebrate .c-text{font-family:var(--serif);font-size:1.15rem;color:var(--cream);margin:.2rem 0 0}

@media (max-width:520px){
  .clock{grid-template-columns:repeat(3,1fr)}
  .next-ms{align-items:flex-start}
}
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important}
}
</style>
</head>
<body>

<!-- ====================== LOCK-SCREEN ====================== -->
<div id="lock">

    <div class="monogram" aria-hidden="true">N<span class="amp">&amp;</span>A</div>

    <form id="lockForm" autocomplete="off">
      <div class="field">
        <input id="pw" type="password" inputmode="text" autocomplete="current-password"
               placeholder="Passphrase" aria-label="Passphrase" />
        <button id="lockBtn" class="btn" type="submit">Öffnen</button>
      </div>
      <p class="lock-error" id="lockError" role="alert"></p>
    </form>
    <p class="lock-foot">Der Inhalt ist mit AES-GCM (256&nbsp;Bit) verschlüsselt und wird
      erst in deinem Browser entschlüsselt. Ohne die richtige Passphrase liegt hier nur Rauschen.</p>
  </div>
</div>

<!-- ====================== APP (wird nach Entschlüsselung gefüllt) ====================== -->
<main id="app" hidden></main>

  /* ----------------------------- DOM (Lock) ----------------------------- */
  var lock   = document.getElementById("lock");
  var app    = document.getElementById("app");

  /* --------------------------- Krypto-Helfer ---------------------------- */

  function b64dec(s){

  /* ---- Hauptzähler ---- */
  function restPhrase(d){
    var parts = [];
    if (d.months) parts.push(plural(d.months,"Monat","Monate"));
    if (d.days)   parts.push(plural(d.days,"Tag","Tage"));
    return parts.length ? " und " + parts.join(", ") : "";
  }
  function exactPhrase(d){
    var p = [];
    if (d.years)  p.push(plural(d.years,"Jahr","Jahre"));
    if (d.months) p.push(plural(d.months,"Monat","Monate"));
    if (d.days)   p.push(plural(d.days,"Tag","Tage"));
    p.push(pad2(d.hours)+" Std", pad2(d.mins)+" Min", pad2(d.secs)+" Sek");
    return p.join(", ");
  }
  function renderMain(now){
    var el = document.getElementById("mainCounter");
    if (!el) return;
    var ms = now - START;
    if (unit === "alles"){ el.innerHTML = renderAll(now); return; }
    var big = "", sub = "";
    if (unit === "sek"){ big = fmt(Math.floor(ms/1e3));  sub = "Sekunden"; }
    else if (unit === "min"){ big = fmt(Math.floor(ms/6e4)); sub = "Minuten"; }
    else if (unit === "std"){ big = fmt(Math.floor(ms/36e5)); sub = "Stunden"; }
    else if (unit === "tag"){ big = fmt(Math.floor(ms/864e5)); sub = "Tage"; }
    else if (unit === "woche"){ big = fmt(Math.floor(ms/6048e5)); sub = "Wochen"; }
    else if (unit === "monat"){
      var dm = H.diffYMD(START, now, TZ);
      big = fmt(dm.years*12 + dm.months);
      sub = "Monate" + (dm.days ? " und " + plural(dm.days,"Tag","Tage") : "");
    } else if (unit === "jahr"){
      var dy = H.diffYMD(START, now, TZ);
      big = fmt(dy.years); sub = "Jahre" + restPhrase(dy);
    } else if (unit === "jahrzehnt"){
      var dz = H.diffYMD(START, now, TZ);
      big = fmt(Math.floor(dz.years/10));
      var ry = dz.years % 10;
      sub = "Jahrzehnte" + (ry ? " und " + plural(ry,"Jahr","Jahre") : "");
    }
    el.innerHTML = '<span class="big">'+big+'</span><span class="unit-label">'+sub+'</span>';
  }
  function renderAll(now){
    var ms = now - START, d = H.diffYMD(START, now, TZ);
    var rows = [
      ["Sekunden", fmt(Math.floor(ms/1e3))],
      ["Minuten",  fmt(Math.floor(ms/6e4))],
      ["Stunden",  fmt(Math.floor(ms/36e5))],
      ["Tage",     fmt(Math.floor(ms/864e5))],
      ["Wochen",   fmt(Math.floor(ms/6048e5))],
      ["Monate",   fmt(d.years*12 + d.months)],
      ["Jahre",    fmt(d.years)]
    ];
    var html = '<dl class="all-grid">';
    for (var i = 0; i < rows.length; i++)
      html += '<div class="all-row" style="--i:'+i+'"><dt>'+rows[i][0]+'</dt><dd>'+rows[i][1]+'</dd></div>';
    html += '</dl><p class="exact">Genau: '+exactPhrase(d)+'</p>';
    return html;
  }

  function buildUnitSwitch(){
    var box = document.getElementById("unitSwitch");
    if (!box) return;
    box.innerHTML = "";
    UNITS.forEach(function (u){
      var b = document.createElement("button");
      b.type = "button"; b.textContent = u.l;
      b.setAttribute("aria-pressed", String(u.k === unit));
      b.addEventListener("click", function (){
        saveUnit(u.k);
        Array.prototype.forEach.call(box.children, function (c, i){
          c.setAttribute("aria-pressed", String(UNITS[i].k === u.k));
        });
        renderMain(Date.now());
      });
      box.appendChild(b);
    });
  }

  /* ---- Hochzeits-Countdown ---- */
  function renderWedding(now){
    var el = document.getElementById("weddingClock");
    if (!el) return;
    if (now >= WED){ el.innerHTML = '<p class="married">Heute wird geheiratet! 💍</p>'; return; }
    var d = H.diffYMD(now, WED, TZ);
    var boxes = [
      ["Jahre", d.years], ["Monate", d.months], ["Tage", d.days],
      ["Std", pad2(d.hours)], ["Min", pad2(d.mins)], ["Sek", pad2(d.secs)]
    ];
    el.innerHTML = boxes.map(function (b){
      return '<div class="box"><span class="num">'+b[1]+'</span><span class="cap">'+b[0]+'</span></div>';
    }).join("");
  }
  function renderHalfway(now){
    var el = document.getElementById("halfway");
    if (!el) return;
    var when = niceDate(HALF);
    if (now >= HALF){
      el.classList.add("reached");
      el.textContent = "✓ Halbzeit erreicht — seit dem " + when + " geht es bergab Richtung Hochzeit.";
    } else {
      var days = Math.ceil((HALF - now) / 864e5);
      el.classList.remove("reached");
      el.textContent = "Halbzeit am " + when + " — noch " + fmt(days) + " " + (days===1?"Tag":"Tage") + ".";
    }
  }

  /* ---- Nächster Meilenstein ---- */
  function nextMs(now){
    var list = LM.getMilestones();
    for (var i = 0; i < list.length; i++) if (list[i].ms > now) return list[i];
    return null;
  }
  function renderNext(now){
    var el = document.getElementById("nextMilestone");
    if (!el) return;
    var m = nextMs(now);
    if (!m){ el.innerHTML = '<p class="next-title">Alle Meilensteine gefeiert. 💖</p>'; return; }
    var rem = m.ms - now;
    var dd = Math.floor(rem/864e5), hh = Math.floor(rem%864e5/36e5),
        mm = Math.floor(rem%36e5/6e4), ss = Math.floor(rem%6e4/1e3);
    function cd(n,c){ return '<div class="cd"><span class="n">'+n+'</span><span class="c">'+c+'</span></div>'; }
    el.innerHTML =
      '<div class="next-emoji" aria-hidden="true">'+m.emoji+'</div>'+
      '<div class="next-body"><p class="next-title">'+m.title+'</p>'+
      '<p class="next-date">am '+niceDate(m.ms)+'</p>'+
      '<div class="next-cd">'+cd(fmt(dd),"Tage")+cd(pad2(hh),"Std")+cd(pad2(mm),"Min")+cd(pad2(ss),"Sek")+'</div></div>';
  }

  /* ---- Meilenstein-Liste (einmal rendern) ---- */
  function dayDiff(aISO, bISO){
    var a = aISO.split("-").map(Number), b = bISO.split("-").map(Number);
    var ma = Date.UTC(a[0],a[1]-1,a[2]), mb = Date.UTC(b[0],b[1]-1,b[2]);
    return Math.round((ma - mb) / 864e5);
  }
  function relText(dateISO, today){
    var diff = dayDiff(dateISO, today);
    if (diff === 0) return "heute";
    if (diff === 1) return "morgen";
    if (diff === -1) return "gestern";
    if (diff > 1) return "in " + fmt(diff) + " Tagen";
    return "vor " + fmt(-diff) + " Tagen";
  }
  function renderList(){
    var el = document.getElementById("msList");
    if (!el) return;
    var list = LM.getMilestones(), today = H.todayISO(TZ);
    var nm = nextMs(Date.now()), nextDate = nm ? nm.date : null;
    var html = "";
    list.forEach(function (m){
      var state = m.date < today ? "past" : (m.date === today ? "today" : "future");
      var tag = m.date === today ? '<span class="ms-tag">heute</span>'
              : (m.date === nextDate ? '<span class="ms-tag next">als Nächstes</span>' : "");
      html += '<li class="ms-item '+state+(m.date===nextDate?" isnext":"")+'" id="ms-'+m.date+'">'+
        '<span class="ms-emoji" aria-hidden="true">'+m.emoji+'</span>'+
        '<span class="ms-main"><span class="ms-title">'+m.title+'</span>'+
        '<span class="ms-date">'+shortDate(m.ms)+' · '+relText(m.date, today)+'</span></span>'+
        tag+'</li>';
    });
    el.innerHTML = html;
    var focusDate = (document.getElementById("ms-"+today)) ? today : nextDate;
    var target = focusDate ? document.getElementById("ms-"+focusDate) : null;
    if (target) target.scrollIntoView({ block:"center" });
  }

  /* ---- .ics-Download ---- */
  function wireIcs(){
    var btn = document.getElementById("icsBtn");
    if (!btn) return;
    btn.addEventListener("click", function (){
      var ics = LM.buildICS(LM.getMilestones());
      var blob = new Blob([ics], { type:"text/calendar;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "love-milestones.ics";
      document.body.appendChild(a); a.click();
      setTimeout(function (){ URL.revokeObjectURL(url); a.remove(); }, 0);
    });
  }

  /* ---- Feier bei Meilenstein heute ---- */
  function celebrateIfToday(){
    var today = H.todayISO(TZ);
    var todays = LM.getMilestones().filter(function (m){ return m.date === today; });
    if (!todays.length) return;
    var m = todays[0];
    var banner = document.createElement("div");
    banner.className = "celebrate";
    banner.innerHTML = '<div class="c-emoji" aria-hidden="true">'+m.emoji+'</div>'+
      '<p class="c-text">Heute ist ein besonderer Tag: '+m.title+'! 🥂</p>';
    app.insertBefore(banner, app.firstChild);
    fireConfetti();
  }

  /* ============================ KONFETTI ============================== */
  var prefersReduced = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  function fireConfetti(){
    if (prefersReduced) return;
    var cv = document.getElementById("confetti");
    var ctx = cv.getContext("2d");
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    function size(){ cv.width = innerWidth*dpr; cv.height = innerHeight*dpr; }
    size();
    var colors = ["#e7b873","#f3d7a6","#e2899a","#f0b8c2","#f3e8da"];
    var parts = [];
    var N = Math.min(220, Math.round(innerWidth/4));
    for (var i = 0; i < N; i++){
      parts.push({
        x: innerWidth*(.5 + (Math.random()-.5)*.5)*dpr,
        y: -20*dpr,
        vx: (Math.random()-.5)*6*dpr,
        vy: (Math.random()*3+2)*dpr,
        g: (.06+Math.random()*.05)*dpr,
        s: (4+Math.random()*5)*dpr,
        rot: Math.random()*Math.PI,
        vr: (Math.random()-.5)*.3,
        c: colors[(Math.random()*colors.length)|0],
        shape: Math.random()<.25?"circle":"rect",
        life: 0, max: 180+Math.random()*60
      });
    }
    var raf;
    function frame(){
      ctx.clearRect(0,0,cv.width,cv.height);
      var alive = 0;
      for (var i = 0; i < parts.length; i++){
        var p = parts[i];
        if (p.life > p.max) continue;
        alive++;
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life++;
        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - p.life/p.max);
        ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.c;
        if (p.shape === "circle"){ ctx.beginPath(); ctx.arc(0,0,p.s/2,0,7); ctx.fill(); }
        else ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s*.6);
        ctx.restore();
      }
      if (alive > 0) raf = requestAnimationFrame(frame);
      else ctx.clearRect(0,0,cv.width,cv.height);
    }
    cancelAnimationFrame(raf); frame();
  }

  /* ====================== AMBIENTE (Glut/Funken) ===================== */
  function startAmbient(){
    var cv = document.getElementById("ambient");
    var ctx = cv.getContext("2d");
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    function size(){ cv.width = innerWidth*dpr; cv.height = innerHeight*dpr; }
    size(); addEventListener("resize", size);
    var n = prefersReduced ? 0 : Math.min(46, Math.round(innerWidth/26));
    var ps = [];
    for (var i = 0; i < n; i++) ps.push(spawn(true));
    function spawn(init){
      return {
        x: Math.random()*innerWidth*dpr,
        y: (init ? Math.random()*innerHeight : innerHeight+10)*dpr,
        r: (Math.random()*1.6+.6)*dpr,
        vy: -(Math.random()*.25+.08)*dpr,
        vx: (Math.random()-.5)*.12*dpr,
        a: Math.random()*.4+.15,
        hue: Math.random()<.5 ? "231,184,115" : "226,137,154"
      };
    }
    function loop(){
      ctx.clearRect(0,0,cv.width,cv.height);
      for (var i = 0; i < ps.length; i++){
        var p = ps[i];
        p.x += p.vx; p.y += p.vy;
        if (p.y < -10*dpr) ps[i] = spawn(false);
        ctx.beginPath();
        ctx.fillStyle = "rgba("+p.hue+","+p.a+")";
        ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
      }
      if (n > 0) requestAnimationFrame(loop);
    }
    if (n > 0) loop();
  }

  /* ============================== INIT =============================== */
  var ticker = null;
  function tick(){
    var now = Date.now();
    renderMain(now); renderWedding(now); renderHalfway(now); renderNext(now);
  }
  function initApp(){
    buildUnitSwitch();
    renderList();
    wireIcs();
    tick();
    if (ticker) clearInterval(ticker);
    ticker = setInterval(tick, 1000);
    startAmbient();
    celebrateIfToday();
    registerSW();
  }

  /* Optionaler Service Worker (Offline-Cache). Bricht NIE die Seite. */
  function registerSW(){
    if (!("serviceWorker" in navigator)) return;
    if (location.protocol !== "https:" && location.hostname !== "localhost") return;
    navigator.serviceWorker.register("sw.js").catch(function (){ /* still ok */ });
  }
})();
</script>
