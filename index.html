<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Angela &amp; Niklas</title>
<meta name="description" content="Ein privater Liebes-Zähler." />
<meta name="theme-color" content="#1a1119" />
<meta name="color-scheme" content="dark" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
<style>
/* ============================ DESIGN-TOKENS ============================ */
:root{
  --night:#1a1119; --night-2:#271a24; --night-3:#2a1c26;
  --line:rgba(231,184,115,.16);
  --gold:#e7b873; --gold-soft:#f6dcae; --rose:#e891a0; --rose-soft:#f4c2c9; --coral:#ec9b7a;
  --cream:#f5ebdd; --muted:#c2a9b6; --muted-2:#8a7682;
  --serif:'Cormorant Garamond',"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
  --maxw:760px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1100px 680px at 50% -8%, rgba(236,155,122,.20), rgba(236,155,122,0) 60%),
    radial-gradient(940px 640px at 102% 112%, rgba(232,145,160,.18), transparent 56%),
    radial-gradient(820px 620px at -6% 28%, rgba(231,184,115,.12), transparent 55%),
    var(--night);
  color:var(--cream);
  font-family:var(--serif);
  line-height:1.5;
  min-height:100vh; min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
canvas#ambient,canvas#confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none}
canvas#ambient{z-index:0;opacity:.6}
canvas#confetti{z-index:60}
::selection{background:rgba(231,184,115,.3)}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:8px}
*::-webkit-scrollbar{width:8px}
*::-webkit-scrollbar-thumb{background:rgba(231,184,115,.22);border-radius:99px}

/* ============================ LOCK-SCREEN ============================ */
#lock{position:relative;z-index:10;min-height:100vh;min-height:100dvh;display:grid;place-items:center;padding:24px}
.lock-card{
  width:min(434px,100%);position:relative;text-align:center;
  background:linear-gradient(180deg,#2a1c26,#1f1620);
  border:1px solid rgba(231,184,115,.18);border-radius:28px;padding:46px 34px 30px;
  box-shadow:0 44px 96px -34px rgba(0,0,0,.85),0 0 70px -22px rgba(236,155,122,.28),inset 0 1px 0 rgba(255,255,255,.04);
}
.lock-card .wax{
  width:88px;height:88px;margin:0 auto 4px;border-radius:50%;display:grid;place-items:center;
  background:radial-gradient(circle at 38% 30%, #f8e2b6, #e7b873 46%, #c98f54 100%);
  box-shadow:0 12px 30px -8px rgba(231,184,115,.6),inset 0 2px 7px rgba(255,255,255,.45),inset 0 -7px 14px rgba(140,80,40,.42);
}
.lock-card .wax span{font-family:var(--serif);font-size:31px;font-weight:600;letter-spacing:.02em;color:#3a2410}
.lock-card .wax .amp{font-style:italic;color:#9a3b48;margin:0 .03em}
.divider{display:flex;align-items:center;justify-content:center;gap:11px;margin:14px 0 4px}
.divider .ln{height:1px;width:36px;background:linear-gradient(90deg,transparent,rgba(231,184,115,.5))}
.divider .ln:last-child{background:linear-gradient(270deg,transparent,rgba(231,184,115,.5))}
.divider .hb{color:var(--rose);font-size:13px;animation:beat 2.4s ease-in-out infinite}
.lock-card h1{font-family:var(--serif);font-weight:600;font-size:1.74rem;margin:.5rem 0 .25rem;color:var(--cream)}
.lock-card .hint{color:var(--muted);font-size:1.04rem;margin:0 0 1.4rem;font-family:var(--sans)}
.field{display:flex;gap:9px;margin-top:6px}
.field input{
  flex:1;min-width:0;background:rgba(0,0,0,.3);border:1px solid var(--line);color:var(--cream);
  font-size:1rem;padding:14px 15px;border-radius:14px;font-family:var(--sans);
}
.field input::placeholder{color:var(--muted-2)}
.field input:focus{outline:none;border-color:rgba(231,184,115,.55)}
.btn{
  border:none;cursor:pointer;font-family:var(--sans);font-weight:600;
  font-size:.96rem;border-radius:14px;padding:14px 21px;
  background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2410;
  transition:transform .15s var(--ease),filter .15s var(--ease),opacity .15s;
}
.btn:hover{filter:brightness(1.06)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.6;cursor:progress}
.lock-error{min-height:1.2em;margin:.9rem 0 0;color:var(--rose-soft);font-size:.92rem;font-family:var(--sans)}
.lock-foot{margin-top:1.4rem;color:var(--muted-2);font-size:.8rem;line-height:1.5;font-family:var(--sans)}
@keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}
#lock.shake .lock-card{animation:shake .5s var(--ease)}
@keyframes beat{0%,100%{transform:scale(1)}14%{transform:scale(1.2)}28%{transform:scale(1)}42%{transform:scale(1.13)}68%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:.85;transform:translate(-50%,-50%) scale(1.07)}}
@keyframes appIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ============================ APP-LAYOUT ============================ */
#app{position:relative;z-index:10;max-width:var(--maxw);margin:0 auto;padding:clamp(22px,5vw,48px) 20px 76px;animation:appIn .7s var(--ease)}
#app[hidden]{display:none}

.seal{text-align:center;margin:4px 0 36px}
.seal .monogram{font-family:var(--serif);font-size:clamp(44px,11vw,62px);font-weight:600;letter-spacing:.02em;color:var(--gold-soft);line-height:1}
.seal .monogram .amp{color:var(--rose);font-style:italic;margin:0 .05em}
.seal .eyebrow{font-family:var(--serif);font-size:1.22rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cream);margin:.2rem 0 .35rem;font-weight:500;position:relative}
.seal .eyebrow::before{content:"\2665";display:block;color:var(--rose);font-size:14px;margin:15px auto 13px;width:1em;animation:beat 2.6s ease-in-out infinite}
.seal .since{color:var(--muted);font-size:1.04rem;margin:0;font-family:var(--sans);letter-spacing:.01em}

/* ---------- HERO / Hauptzähler ---------- */
.hero{position:relative;text-align:center;margin:6px 0 46px}
.hero::before{content:"";position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);width:min(560px,88%);height:300px;pointer-events:none;z-index:0;background:radial-gradient(closest-side, rgba(236,155,122,.24), rgba(232,145,160,.1) 55%, transparent 76%);filter:blur(6px);animation:pulse 6.5s ease-in-out infinite}
.hero>*{position:relative;z-index:1}
.hero-label{color:var(--muted);font-size:1.08rem;margin:0 0 .5rem;font-family:var(--sans);font-style:italic}
.counter{font-family:var(--serif);line-height:1}
.counter .big{
  display:block;font-size:clamp(3.6rem,17vw,8.6rem);font-weight:600;
  color:var(--gold-soft);font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;
  letter-spacing:.005em;text-shadow:0 0 48px rgba(236,155,122,.42),0 2px 0 rgba(0,0,0,.25);
}
.counter .unit-label{display:block;font-family:var(--sans);font-size:1rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-top:.7rem}
.all-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:11px;margin:.4rem 0 0;padding:0;text-align:left}
.all-row{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:16px;padding:13px 15px;
  display:flex;flex-direction:column;gap:3px;opacity:0;transform:translateY(8px);
  animation:rise .5s var(--ease) forwards;animation-delay:calc(var(--i)*60ms)}
@keyframes rise{to{opacity:1;transform:none}}
.all-row dt{font-family:var(--sans);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.all-row dd{margin:0;font-family:var(--serif);font-size:1.85rem;color:var(--gold-soft);font-variant-numeric:tabular-nums}
.exact{margin:16px 2px 0;color:var(--rose-soft);font-size:.96rem;text-align:center;font-family:var(--sans)}

.unit-switch{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;margin-top:30px}
.unit-switch button{
  font-family:var(--sans);font-size:.84rem;letter-spacing:.02em;cursor:pointer;
  padding:9px 15px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.02);color:var(--muted);transition:all .18s var(--ease)}
.unit-switch button:hover{color:var(--cream);border-color:rgba(231,184,115,.4)}
.unit-switch button[aria-pressed="true"]{
  background:linear-gradient(180deg,rgba(231,184,115,.24),rgba(231,184,115,.1));
  color:var(--gold-soft);border-color:rgba(231,184,115,.55)}

/* ---------- PANELS ---------- */
.panel{
  background:linear-gradient(180deg,var(--night-2),rgba(31,22,32,.66));
  border:1px solid var(--line);border-radius:22px;padding:24px 24px 26px;margin:18px 0;
  box-shadow:0 24px 56px -36px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.03)}
.panel-head{margin-bottom:18px}
.panel-head .kicker{font-family:var(--sans);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);display:block;margin-bottom:4px}
.panel-head h2{font-family:var(--serif);font-weight:600;font-size:1.42rem;margin:0;color:var(--cream)}
.list-head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap}
.list-head .btn{background:rgba(231,184,115,.13);color:var(--gold-soft);border:1px solid rgba(231,184,115,.4);font-weight:500;font-size:.85rem;padding:10px 16px;border-radius:999px}
.list-head .btn:hover{background:rgba(231,184,115,.22);filter:none}

/* ---------- Hochzeits-Uhr ---------- */
.clock{display:grid;grid-template-columns:repeat(auto-fit,minmax(48px,1fr));gap:9px}
.clock .box{background:rgba(0,0,0,.24);border:1px solid var(--line);border-radius:15px;padding:15px 4px;text-align:center}
.clock .num{display:block;font-family:var(--serif);font-size:clamp(1.5rem,6vw,2.1rem);color:var(--gold-soft);font-variant-numeric:tabular-nums}
.clock .cap{display:block;font-family:var(--sans);font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-top:5px}
.married{font-family:var(--serif);font-size:1.6rem;color:var(--gold-soft);text-align:center;margin:6px 0}
.halfway{margin:16px 2px 0;color:var(--muted);font-size:.96rem;text-align:center;font-family:var(--sans)}
.halfway.reached{color:var(--rose-soft)}

/* ---------- Nächster Meilenstein ---------- */
.next-ms{display:flex;align-items:center;gap:17px}
.next-emoji{font-size:2.7rem;line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
.next-body{flex:1;min-width:0}
.next-title{font-family:var(--serif);font-size:1.32rem;color:var(--cream);margin:0 0 2px}
.next-date{color:var(--muted);font-size:.92rem;margin:0 0 12px;font-family:var(--sans)}
.next-cd{display:flex;gap:8px;flex-wrap:wrap}
.cd{background:rgba(0,0,0,.24);border:1px solid var(--line);border-radius:12px;padding:8px 12px;text-align:center;min-width:56px}
.cd .n{display:block;font-family:var(--serif);font-size:1.3rem;color:var(--gold-soft);font-variant-numeric:tabular-nums}
.cd .c{display:block;font-family:var(--sans);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* ---------- Meilenstein-Liste ---------- */
.ms-list{list-style:none;margin:4px 0 0;padding:0 2px 0 0;max-height:382px;overflow-x:hidden;overflow-y:auto;
  -webkit-mask-image:linear-gradient(180deg,transparent,#000 18px,#000 calc(100% - 18px),transparent);
          mask-image:linear-gradient(180deg,transparent,#000 18px,#000 calc(100% - 18px),transparent)}
.ms-item{display:flex;align-items:center;gap:13px;padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.05);border-radius:12px}
.ms-item:last-child{border-bottom:0}
.ms-emoji{font-size:1.4rem;width:1.6em;text-align:center;flex:none}
.ms-main{flex:1;min-width:0}
.ms-title{display:block;color:var(--cream);font-size:1.06rem;line-height:1.25}
.ms-date{display:block;color:var(--muted-2);font-size:.82rem;margin-top:1px;font-family:var(--sans)}
.ms-tag{font-family:var(--sans);font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;flex:none;white-space:nowrap}
.ms-tag{background:rgba(232,145,160,.16);color:var(--rose-soft);border:1px solid rgba(232,145,160,.4)}
.ms-tag.next{background:rgba(231,184,115,.14);color:var(--gold-soft);border-color:rgba(231,184,115,.38)}
.ms-item.past{opacity:.42}
.ms-item.past .ms-emoji{filter:grayscale(.5)}
.ms-item.today{background:linear-gradient(90deg,rgba(231,184,115,.14),transparent)}
.ms-item.isnext .ms-title{color:var(--gold-soft)}

/* ---------- Footer ---------- */
.foot{text-align:center;margin-top:46px}
.foot .foot-line{font-family:var(--serif);font-style:italic;font-size:1.42rem;color:var(--cream);margin:0}
.foot .sig{color:var(--muted);font-size:.86rem;letter-spacing:.18em;margin:.6rem 0 0;font-family:var(--sans)}

/* ---------- Feier-Banner (heute = Meilenstein) ---------- */
.celebrate{position:relative;z-index:10;margin:0 0 24px;border-radius:20px;padding:17px 20px;text-align:center;
  background:linear-gradient(180deg,rgba(231,184,115,.22),rgba(232,145,160,.15));
  border:1px solid rgba(231,184,115,.45);box-shadow:0 16px 44px -22px rgba(231,184,115,.6)}
.celebrate .c-emoji{font-size:1.85rem}
.celebrate .c-text{font-family:var(--serif);font-size:1.2rem;color:var(--cream);margin:.25rem 0 0}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important}
}
</style>
</head>

    return u;
  }
  function deriveKey(pw, salt, iter){
    return crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"])
      .then(function (base){
        return crypto.subtle.deriveKey(
          { name:"PBKDF2", salt:salt, iterations:iter, hash:"SHA-256" },
          base, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
      });
  }
  function decryptContent(pw){
    var salt = b64dec(ENC.salt), iv = b64dec(ENC.iv), ct = b64dec(ENC.ct);
    return deriveKey(pw, salt, ENC.iter).then(function (key){
      return crypto.subtle.decrypt({ name:"AES-GCM", iv:iv }, key, ct);
    }).then(function (buf){ return new TextDecoder().decode(buf); });
  }

  if (!hasCrypto){
    lockError.textContent = "Dieser Browser/Kontext erlaubt keine Verschlüsselung. " +
      "Bitte über https oder http://localhost öffnen.";
    lockBtn.disabled = true;
  }

  /* ----------------------------- Lock-Flow ------------------------------ */
  form.addEventListener("submit", function (e){
    e.preventDefault();
    if (!hasCrypto) return;
    var pw = pwInput.value;
    if (!pw) { pwInput.focus(); return; }
    lockError.textContent = "";
    lockBtn.disabled = true;
    lockBtn.textContent = "Entschlüssle…";

    function fail(msg, shake){
      lockBtn.disabled = false;
      lockBtn.textContent = "Öffnen";
      lockError.textContent = msg;
      if (shake){ lock.classList.remove("shake"); void lock.offsetWidth; lock.classList.add("shake"); }
      pwInput.select();
    }

    // Notbremse: falls aus irgendeinem Grund nie etwas zurückkommt,
    // bleibt der Button nicht für immer auf "Entschlüssle…" hängen.
    var settled = false;
    var watchdog = setTimeout(function (){
      if (!settled) fail("Das dauert ungewöhnlich lange. Bitte die Seite neu laden (Strg/Cmd + Shift + R) und erneut versuchen.", false);
    }, 12000);

    // Promise.resolve() fängt auch SYNCHRONE Fehler in decryptContent ab
    // (z. B. beschädigte/abgeschnittene Daten) — sonst hinge der Button.
    Promise.resolve().then(function (){ return decryptContent(pw); }).then(function (html){
      settled = true; clearTimeout(watchdog);
      app.innerHTML = html;
      lock.hidden = true;
      app.hidden = false;
      document.body.classList.add("unlocked");
      pwInput.value = "";
      try { initApp(); } catch (err) { console.error("initApp:", err); }
    }).catch(function (err){
      settled = true; clearTimeout(watchdog);
      var name = (err && err.name) ? err.name : "";
      if (name === "OperationError" || name === "InvalidAccessError" || name === ""){
        fail("Falsche Passphrase. Versuch es noch einmal.", true);
      } else {
        console.error("Entschlüsselung fehlgeschlagen:", err);
        fail("Technischer Fehler beim Entschlüsseln. Bitte die Seite neu laden und erneut versuchen.", true);
      }
    });
  });

  /* =========================== APP / ZÄHLER ============================= */
  var UNITS = [
    { k:"sek", l:"Sekunden" }, { k:"min", l:"Minuten" }, { k:"std", l:"Stunden" },
    { k:"tag", l:"Tage" }, { k:"woche", l:"Wochen" }, { k:"monat", l:"Monate" },
    { k:"jahr", l:"Jahre" }, { k:"jahrzehnt", l:"Jahrzehnte" }, { k:"alles", l:"Alles" }
  ];
  var memUnit = "tag";
  function loadUnit(){ try { return localStorage.getItem("na_unit") || "tag"; } catch (e) { return memUnit; } }
  function saveUnit(u){ unit = u; memUnit = u; try { localStorage.setItem("na_unit", u); } catch (e) {} }
  var unit = loadUnit();

  var fmt = H.deNum;
  function plural(n, one, many){ return n + " " + (n === 1 ? one : many); }

  var _long  = new Intl.DateTimeFormat("de-DE", { day:"numeric", month:"long", year:"numeric", timeZone:TZ });
  var _short = new Intl.DateTimeFormat("de-DE", { day:"2-digit", month:"2-digit", year:"numeric", timeZone:TZ });
  function niceDate(ms){ return _long.format(new Date(ms)); }
  function shortDate(ms){ return _short.format(new Date(ms)); }
  function pad2(n){ return String(n).padStart(2,"0"); }

  /* ---- Hauptzähler ---- */
  function restPhrase(d){
    var parts = [];
    if (d.months) parts.push(plural(d.months,"Monat","Monate"));
    if (d.days)   parts.push(plural(d.days,"Tag","Tage"));
    return parts.length ? " und " + parts.join(", ") : "";
  }
  function exactPhrase(d){
    var p = [];
    if (d.years)  p.push(plural(d.years,"Jahr","Jahre"));
    if (d.months) p.push(plural(d.months,"Monat","Monate"));
    if (d.days)   p.push(plural(d.days,"Tag","Tage"));
    p.push(pad2(d.hours)+" Std", pad2(d.mins)+" Min", pad2(d.secs)+" Sek");
    return p.join(", ");
  }
  function renderMain(now){
    var el = document.getElementById("mainCounter");
    if (!el) return;
    var ms = now - START;
    if (unit === "alles"){ el.innerHTML = renderAll(now); return; }
    var big = "", sub = "";
    if (unit === "sek"){ big = fmt(Math.floor(ms/1e3));  sub = "Sekunden"; }
    else if (unit === "min"){ big = fmt(Math.floor(ms/6e4)); sub = "Minuten"; }
    else if (unit === "std"){ big = fmt(Math.floor(ms/36e5)); sub = "Stunden"; }
    else if (unit === "tag"){ big = fmt(Math.floor(ms/864e5)); sub = "Tage"; }
    else if (unit === "woche"){ big = fmt(Math.floor(ms/6048e5)); sub = "Wochen"; }
    else if (unit === "monat"){
      var dm = H.diffYMD(START, now, TZ);
      big = fmt(dm.years*12 + dm.months);
      sub = "Monate" + (dm.days ? " und " + plural(dm.days,"Tag","Tage") : "");
    } else if (unit === "jahr"){
      var dy = H.diffYMD(START, now, TZ);
      big = fmt(dy.years); sub = "Jahre" + restPhrase(dy);
    } else if (unit === "jahrzehnt"){
      var dz = H.diffYMD(START, now, TZ);
      big = fmt(Math.floor(dz.years/10));
      var ry = dz.years % 10;
      sub = "Jahrzehnte" + (ry ? " und " + plural(ry,"Jahr","Jahre") : "");
    }
    el.innerHTML = '<span class="big">'+big+'</span><span class="unit-label">'+sub+'</span>';
  }
  function renderAll(now){
    var ms = now - START, d = H.diffYMD(START, now, TZ);
    var rows = [
      ["Sekunden", fmt(Math.floor(ms/1e3))],
      ["Minuten",  fmt(Math.floor(ms/6e4))],
      ["Stunden",  fmt(Math.floor(ms/36e5))],
      ["Tage",     fmt(Math.floor(ms/864e5))],
      ["Wochen",   fmt(Math.floor(ms/6048e5))],
      ["Monate",   fmt(d.years*12 + d.months)],
      ["Jahre",    fmt(d.years)]
    ];
    var html = '<dl class="all-grid">';
    for (var i = 0; i < rows.length; i++)
      html += '<div class="all-row" style="--i:'+i+'"><dt>'+rows[i][0]+'</dt><dd>'+rows[i][1]+'</dd></div>';
    html += '</dl><p class="exact">Genau: '+exactPhrase(d)+'</p>';
    return html;
  }

  function buildUnitSwitch(){
    var box = document.getElementById("unitSwitch");
    if (!box) return;
    box.innerHTML = "";
    UNITS.forEach(function (u){
      var b = document.createElement("button");
      b.type = "button"; b.textContent = u.l;
      b.setAttribute("aria-pressed", String(u.k === unit));
      b.addEventListener("click", function (){
        saveUnit(u.k);
        Array.prototype.forEach.call(box.children, function (c, i){
          c.setAttribute("aria-pressed", String(UNITS[i].k === u.k));
        });
        renderMain(Date.now());
      });
      box.appendChild(b);
    });
  }

  /* ---- Hochzeits-Countdown ---- */
  function renderWedding(now){
    var el = document.getElementById("weddingClock");
    if (!el) return;
    if (now >= WED){ el.innerHTML = '<p class="married">Heute wird geheiratet! 💍</p>'; return; }
    var d = H.diffYMD(now, WED, TZ);
    var boxes = [
      ["Jahre", d.years], ["Monate", d.months], ["Tage", d.days],
      ["Std", pad2(d.hours)], ["Min", pad2(d.mins)], ["Sek", pad2(d.secs)]
    ];
    el.innerHTML = boxes.map(function (b){
      return '<div class="box"><span class="num">'+b[1]+'</span><span class="cap">'+b[0]+'</span></div>';
    }).join("");
  }
  function renderHalfway(now){
    var el = document.getElementById("halfway");
    if (!el) return;
    var when = niceDate(HALF);
    if (now >= HALF){
      el.classList.add("reached");
      el.textContent = "✓ Halbzeit erreicht — seit dem " + when + " geht es bergab Richtung Hochzeit.";
    } else {
      var days = Math.ceil((HALF - now) / 864e5);
      el.classList.remove("reached");
      el.textContent = "Halbzeit am " + when + " — noch " + fmt(days) + " " + (days===1?"Tag":"Tage") + ".";
    }
  }

  /* ---- Nächster Meilenstein ---- */
  function nextMs(now){
    var list = LM.getMilestones();
    for (var i = 0; i < list.length; i++) if (list[i].ms > now) return list[i];
    return null;
  }
  function renderNext(now){
    var el = document.getElementById("nextMilestone");
    if (!el) return;
    var m = nextMs(now);
    if (!m){ el.innerHTML = '<p class="next-title">Alle Meilensteine gefeiert. 💖</p>'; return; }
    var rem = m.ms - now;
    var dd = Math.floor(rem/864e5), hh = Math.floor(rem%864e5/36e5),
        mm = Math.floor(rem%36e5/6e4), ss = Math.floor(rem%6e4/1e3);
    function cd(n,c){ return '<div class="cd"><span class="n">'+n+'</span><span class="c">'+c+'</span></div>'; }
    el.innerHTML =
      '<div class="next-emoji" aria-hidden="true">'+m.emoji+'</div>'+
      '<div class="next-body"><p class="next-title">'+m.title+'</p>'+
      '<p class="next-date">am '+niceDate(m.ms)+'</p>'+
      '<div class="next-cd">'+cd(fmt(dd),"Tage")+cd(pad2(hh),"Std")+cd(pad2(mm),"Min")+cd(pad2(ss),"Sek")+'</div></div>';
  }

  /* ---- Meilenstein-Liste (einmal rendern) ---- */
  function dayDiff(aISO, bISO){
    var a = aISO.split("-").map(Number), b = bISO.split("-").map(Number);
    var ma = Date.UTC(a[0],a[1]-1,a[2]), mb = Date.UTC(b[0],b[1]-1,b[2]);
    return Math.round((ma - mb) / 864e5);
  }
  function relText(dateISO, today){
    var diff = dayDiff(dateISO, today);
    if (diff === 0) return "heute";
    if (diff === 1) return "morgen";
    if (diff === -1) return "gestern";
    if (diff > 1) return "in " + fmt(diff) + " Tagen";
    return "vor " + fmt(-diff) + " Tagen";
  }
  function renderList(){
    var el = document.getElementById("msList");
    if (!el) return;
    var list = LM.getMilestones(), today = H.todayISO(TZ);
    var nm = nextMs(Date.now()), nextDate = nm ? nm.date : null;
    var html = "";
    list.forEach(function (m){
      var state = m.date < today ? "past" : (m.date === today ? "today" : "future");
      var tag = m.date === today ? '<span class="ms-tag">heute</span>'
              : (m.date === nextDate ? '<span class="ms-tag next">als Nächstes</span>' : "");
      html += '<li class="ms-item '+state+(m.date===nextDate?" isnext":"")+'" id="ms-'+m.date+'">'+
        '<span class="ms-emoji" aria-hidden="true">'+m.emoji+'</span>'+
        '<span class="ms-main"><span class="ms-title">'+m.title+'</span>'+
        '<span class="ms-date">'+shortDate(m.ms)+' · '+relText(m.date, today)+'</span></span>'+
        tag+'</li>';
    });
    el.innerHTML = html;
    var focusDate = (document.getElementById("ms-"+today)) ? today : nextDate;
    var target = focusDate ? document.getElementById("ms-"+focusDate) : null;
    if (target) { try { el.scrollTop = target.offsetTop - el.clientHeight/2 + target.clientHeight/2; } catch (e) {} }
  }

  /* ---- .ics-Download ---- */
  function wireIcs(){
    var btn = document.getElementById("icsBtn");
    if (!btn) return;
    btn.addEventListener("click", function (){
      var ics = LM.buildICS(LM.getMilestones());
      var blob = new Blob([ics], { type:"text/calendar;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = "love-milestones.ics";
      document.body.appendChild(a); a.click();
      setTimeout(function (){ URL.revokeObjectURL(url); a.remove(); }, 0);
    });
  }

  /* ---- Feier bei Meilenstein heute ---- */
  function celebrateIfToday(){
    var today = H.todayISO(TZ);
    var todays = LM.getMilestones().filter(function (m){ return m.date === today; });
    if (!todays.length) return;
    var m = todays[0];
    var banner = document.createElement("div");
    banner.className = "celebrate";
    banner.innerHTML = '<div class="c-emoji" aria-hidden="true">'+m.emoji+'</div>'+
      '<p class="c-text">Heute ist ein besonderer Tag: '+m.title+'! 🥂</p>';
    app.insertBefore(banner, app.firstChild);
    fireConfetti();
  }

  /* ============================ KONFETTI ============================== */
  var prefersReduced = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  function fireConfetti(){
    if (prefersReduced) return;
    var cv = document.getElementById("confetti");
    var ctx = cv.getContext("2d");
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = innerWidth*dpr; cv.height = innerHeight*dpr;
    var colors = ["#e7b873","#f6dcae","#e891a0","#f4c2c9","#ec9b7a","#f5ebdd"];
    var parts = [];
    var N = Math.min(220, Math.round(innerWidth/4));
    for (var i = 0; i < N; i++){
      parts.push({
        x: innerWidth*(.5 + (Math.random()-.5)*.5)*dpr,
        y: -20*dpr,
        vx: (Math.random()-.5)*6*dpr,
        vy: (Math.random()*3+2)*dpr,
        g: (.06+Math.random()*.05)*dpr,
        s: (4+Math.random()*5)*dpr,
        rot: Math.random()*Math.PI,
        vr: (Math.random()-.5)*.3,
        c: colors[(Math.random()*colors.length)|0],
        shape: Math.random()<.3 ? "heart" : (Math.random()<.5 ? "circle" : "rect"),
        life: 0, max: 180+Math.random()*60
      });
    }
    var raf;
    function frame(){
      ctx.clearRect(0,0,cv.width,cv.height);
      var alive = 0;
      for (var i = 0; i < parts.length; i++){
        var p = parts[i];
        if (p.life > p.max) continue;
        alive++;
        p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life++;
        ctx.save();
        ctx.globalAlpha = Math.max(0, 1 - p.life/p.max);
        ctx.translate(p.x, p.y); ctx.rotate(p.rot); ctx.fillStyle = p.c;
        if (p.shape === "circle"){ ctx.beginPath(); ctx.arc(0,0,p.s/2,0,7); ctx.fill(); }
        else if (p.shape === "heart"){
          var s = p.s/1.1;
          ctx.beginPath();
          ctx.moveTo(0, s*.35);
          ctx.bezierCurveTo(-s*.55, -s*.25, -s*1.1, s*.35, 0, s);
          ctx.bezierCurveTo(s*1.1, s*.35, s*.55, -s*.25, 0, s*.35);
          ctx.fill();
        }
        else ctx.fillRect(-p.s/2, -p.s/2, p.s, p.s*.6);
        ctx.restore();
      }
      if (alive > 0) raf = requestAnimationFrame(frame);
      else ctx.clearRect(0,0,cv.width,cv.height);
    }
    cancelAnimationFrame(raf); frame();
  }

  /* ====================== AMBIENTE (Glut + Herzen) ===================== */
  function startAmbient(){
    var cv = document.getElementById("ambient");
    var ctx = cv.getContext("2d");
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    function size(){ cv.width = innerWidth*dpr; cv.height = innerHeight*dpr; }
    size(); addEventListener("resize", size);
    var embN   = prefersReduced ? 0 : Math.min(46, Math.round(innerWidth/26));
    var heartN = prefersReduced ? 0 : Math.min(15, Math.round(innerWidth/86));
    var ps = [];
    function spawnE(init){
      return {
        t:"e",
        x: Math.random()*innerWidth*dpr,
        y: (init ? Math.random()*innerHeight : innerHeight+10)*dpr,
        r: (Math.random()*1.6+.6)*dpr,
        vy: -(Math.random()*.25+.08)*dpr,
        vx: (Math.random()-.5)*.12*dpr,
        a: Math.random()*.4+.15,
        hue: Math.random()<.5 ? "231,184,115" : "232,145,160"
      };
    }
    function spawnH(init){
      return {
        t:"h",
        x: Math.random()*innerWidth*dpr,
        y: (init ? Math.random()*innerHeight : innerHeight+24)*dpr,
        s: (8+Math.random()*10)*dpr,
        vy: -(Math.random()*.18+.05)*dpr,
        vx: (Math.random()-.5)*.08*dpr,
        a: Math.random()*.1+.05,
        rot: (Math.random()-.5)*.5,
        hue: Math.random()<.5 ? "232,145,160" : "236,155,122"
      };
    }
    for (var i = 0; i < embN; i++) ps.push(spawnE(true));
    for (var j = 0; j < heartN; j++) ps.push(spawnH(true));
    function heart(x,y,s,rot,hue,a){
      ctx.save(); ctx.globalAlpha = a; ctx.translate(x,y); ctx.rotate(rot); ctx.scale(s,s);
      ctx.fillStyle = "rgb("+hue+")"; ctx.beginPath();
      ctx.moveTo(0,.35);
      ctx.bezierCurveTo(-.55,-.25,-1.1,.35,0,1);
      ctx.bezierCurveTo(1.1,.35,.55,-.25,0,.35);
      ctx.closePath(); ctx.fill(); ctx.restore();
    }
    function loop(){
      ctx.clearRect(0,0,cv.width,cv.height);
      for (var i = 0; i < ps.length; i++){
        var p = ps[i];
        p.x += p.vx; p.y += p.vy;
        if (p.y < -32*dpr){ ps[i] = p.t==="h" ? spawnH(false) : spawnE(false); continue; }
        if (p.t === "e"){
          ctx.beginPath();
          ctx.fillStyle = "rgba("+p.hue+","+p.a+")";
          ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
        } else heart(p.x, p.y, p.s, p.rot, p.hue, p.a);
      }
      if (ps.length) requestAnimationFrame(loop);
    }
    if (ps.length) loop();
  }

  /* ============================== INIT =============================== */
  var ticker = null;
  function tick(){
    var now = Date.now();
    renderMain(now); renderWedding(now); renderHalfway(now); renderNext(now);
  }
  function initApp(){
    buildUnitSwitch();
    renderList();
    wireIcs();
    tick();
    if (ticker) clearInterval(ticker);
    ticker = setInterval(tick, 1000);
    startAmbient();
    celebrateIfToday();
    registerSW();
  }

  /* Optionaler Service Worker (Offline-Cache). Bricht NIE die Seite. */
  function registerSW(){
    if (!("serviceWorker" in navigator)) return;
    if (location.protocol !== "https:" && location.hostname !== "localhost") return;
    navigator.serviceWorker.register("sw.js").catch(function (){ /* still ok */ });
  }
})();
</script>
