  <!-- Herz -->
  <path fill="url(#heart)" d="M256 392c-8 0-16-3-22-9l-112-110c-34-33-34-88 0-121 31-30 80-30 112 0l22 21 22-21c32-30 81-30 112 0 34 33 34 88 0 121L278 383c-6 6-14 9-22 9z"/>
